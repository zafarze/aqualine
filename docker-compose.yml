services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aqualine}
      POSTGRES_USER: ${POSTGRES_USER:-aqualine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aqualine}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py makemigrations users clients products orders finance suppliers purchases stock settings_app notifications &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  celery:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
    command: celery -A config worker -l info

  celery-beat:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  crm:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "corepack enable && pnpm install --frozen-lockfile=false && pnpm --filter crm dev"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${CRM_API_URL:-http://localhost:8000/api}

  cabinet:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "corepack enable && pnpm install --frozen-lockfile=false && pnpm --filter cabinet dev"
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: ${CABINET_API_URL:-http://localhost:8000/api}

volumes:
  pgdata:
