# Firebase App Hosting config for AquaLine CRM
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 1024
  maxInstances: 5
  minInstances: 0
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_API_URL
    value: https://api-aqualine-placeholder.example.com/api
    availability:
      - BUILD
      - RUNTIME
