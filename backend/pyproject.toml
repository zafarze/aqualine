[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    "venv",
    ".venv",
    "*/migrations/*",
    "staticfiles",
    "media",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E501",  # длина строки — оставим форматтеру
    "B008",  # Function call in default argument (DRF/Django patterns)
]
