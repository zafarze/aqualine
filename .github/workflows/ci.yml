name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aqualine
          POSTGRES_USER: aqualine
          POSTGRES_PASSWORD: aqualine
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aqualine"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Django check
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_ALLOWED_HOSTS: "*"
          DATABASE_URL: postgres://aqualine:aqualine@localhost:5432/aqualine
          CELERY_TASK_ALWAYS_EAGER: "1"
        run: python manage.py check
      - name: Migrate
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_ALLOWED_HOSTS: "*"
          DATABASE_URL: postgres://aqualine:aqualine@localhost:5432/aqualine
          CELERY_TASK_ALWAYS_EAGER: "1"
        run: python manage.py migrate --noinput
      - name: Tests
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_ALLOWED_HOSTS: "*"
          DATABASE_URL: postgres://aqualine:aqualine@localhost:5432/aqualine
          CELERY_TASK_ALWAYS_EAGER: "1"
        run: python manage.py test --noinput

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Lint CRM
        run: pnpm --filter crm lint
      - name: Lint Cabinet
        run: pnpm --filter cabinet lint
      - name: Typecheck CRM
        run: pnpm --filter crm typecheck
      - name: Typecheck Cabinet
        run: pnpm --filter cabinet typecheck
      - name: Typecheck UI
        run: pnpm --filter @aqualine/ui typecheck
      - name: Build CRM
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: pnpm --filter crm build
      - name: Build Cabinet
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: pnpm --filter cabinet build
