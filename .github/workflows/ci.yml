name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aqualine
          POSTGRES_USER: aqualine
          POSTGRES_PASSWORD: aqualine
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aqualine"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: ci-secret
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://aqualine:aqualine@localhost:5432/aqualine
      CELERY_TASK_ALWAYS_EAGER: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Lint (ruff)
        run: ruff check .
        continue-on-error: true
      - name: Django check
        run: python manage.py check
      - name: Migrate
        run: python manage.py migrate --noinput
      - name: Tests
        run: python manage.py test --noinput

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/apps/crm/package-lock.json
            frontend/apps/cabinet/package-lock.json

      - name: Install CRM
        working-directory: frontend/apps/crm
        run: npm install --no-audit --no-fund
      - name: Typecheck CRM
        working-directory: frontend/apps/crm
        run: npm run typecheck
      - name: Build CRM
        working-directory: frontend/apps/crm
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build

      - name: Install Cabinet
        working-directory: frontend/apps/cabinet
        run: npm install --no-audit --no-fund
      - name: Typecheck Cabinet
        working-directory: frontend/apps/cabinet
        run: npm run typecheck
      - name: Build Cabinet
        working-directory: frontend/apps/cabinet
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build
